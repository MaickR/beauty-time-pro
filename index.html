<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Beauty Time Pro — Gestión de reservas, agenda y finanzas para salones de belleza en México y Colombia." />
    <meta name="theme-color" content="#143C32" />
    <meta property="og:title" content="Beauty Time Pro" />
    <meta property="og:description" content="Plataforma SaaS para gestión de salones de belleza." />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/svg+xml" href="/Logo-App.svg" />
    <link rel="apple-touch-icon" href="/Logo-App.svg" />
    <link rel="preload" as="image" href="/btp-login.png" fetchpriority="high" />
    <title>Beauty Time Pro</title>
    <style>
      :root {
        color-scheme: light;
      }

      #app-preloader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: clamp(12px, 4vw, 32px);
        background:
          radial-gradient(circle at 74% 20%, rgba(198, 150, 140, 0.24) 0%, rgba(198, 150, 140, 0.06) 30%, transparent 56%),
          linear-gradient(180deg, #0a2823 0%, #143c32 100%);
        transition: opacity 180ms ease, visibility 180ms ease, transform 180ms ease;
      }

      #app-preloader[data-hidden='true'] {
        opacity: 0;
        visibility: hidden;
        transform: scale(1.015);
        pointer-events: none;
      }

      .app-preloader__card {
        width: min(100%, 420px);
        display: grid;
        justify-items: center;
        gap: 12px;
        padding: clamp(18px, 4vw, 28px);
        border: 1px solid rgba(198, 150, 140, 0.38);
        border-radius: 28px;
        background: linear-gradient(180deg, rgba(20, 60, 50, 0.72) 0%, rgba(10, 40, 35, 0.8) 100%);
        box-shadow: 0 26px 86px rgba(0, 0, 0, 0.34);
        text-align: center;
        backdrop-filter: blur(12px);
      }

      .app-preloader__logo {
        width: clamp(168px, 42vw, 264px);
        height: auto;
        object-fit: contain;
        animation: app-preloader-float 1.15s ease-in-out infinite;
      }

      .app-preloader__subtitle {
        margin: 0;
        font: 700 clamp(0.76rem, 1.7vw, 0.84rem)/1 Arial, sans-serif;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(198, 150, 140, 0.95);
      }

      .app-preloader__text {
        margin: 0;
        max-width: 26ch;
        font: 500 clamp(0.9rem, 2.4vw, 1rem)/1.5 Arial, sans-serif;
        color: rgba(250, 248, 246, 0.92);
      }

      .app-preloader__bar {
        position: relative;
        width: min(100%, 250px);
        height: 7px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(120, 115, 110, 0.44);
      }

      .app-preloader__bar::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        width: var(--preloader-progress, 22%);
        background: linear-gradient(90deg, #c6968c 0%, #d4ad9f 35%, #78736e 100%);
        box-shadow: 0 0 18px rgba(198, 150, 140, 0.45);
        transition: width 120ms ease-out;
      }

      .app-preloader__meta {
        font: 700 0.8rem/1 Arial, sans-serif;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(232, 225, 220, 0.95);
      }

      @keyframes app-preloader-float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-4px); }
      }

      @media (prefers-reduced-motion: reduce) {
        .app-preloader__logo,
        .app-preloader__bar::before {
          animation: none;
          transition: none;
        }
      }
    </style>
  </head>
  <body class="bg-slate-50">
    <div id="app-preloader" aria-live="polite">
      <div class="app-preloader__card">
        <img class="app-preloader__logo" src="/btp-login.png" alt="Beauty Time Pro" />
        <div class="app-preloader__subtitle">Beauty Time Pro</div>
        <p class="app-preloader__text">Preparando tu experiencia</p>
        <div class="app-preloader__bar" aria-hidden="true"></div>
        <div class="app-preloader__meta" id="app-preloader-percent">22%</div>
      </div>
    </div>
    <div id="root"></div>
    <script>
      (function () {
        var nodo = document.getElementById('app-preloader');
        var porcentaje = document.getElementById('app-preloader-percent');
        if (!nodo || !porcentaje) return;

        var valor = 18;
        var temporizador = window.setInterval(function () {
          if (valor >= 92) {
            window.clearInterval(temporizador);
            return;
          }
          valor = valor < 60 ? valor + 8 : valor + 3;
          porcentaje.textContent = valor + '%';
          nodo.style.setProperty('--preloader-progress', valor + '%');
        }, 42);

        window.addEventListener('beforeunload', function () {
          window.clearInterval(temporizador);
        });
      })();

      window.__ocultarPreloader = function () {
        const nodo = document.getElementById('app-preloader');
        if (!nodo || nodo.dataset.hidden === 'true') return;
        nodo.dataset.hidden = 'true';
        window.setTimeout(function () {
          nodo.remove();
        }, 220);
      };
      window.addEventListener('load', function () {
        if (typeof window.__ocultarPreloader === 'function') {
          window.__ocultarPreloader();
        }
      }, { once: true });
    </script>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
